<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probability Training Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/brain.js@2.0.0-beta.24/browser.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        <header class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Event Probability Engine</h1>
                <p class="text-slate-500">Neural Network Trainer — Worker code is embedded inside this file</p>
            </div>
            <div id="statusBadge" class="bg-slate-100 text-slate-600 px-4 py-1.5 rounded-2xl text-xs font-semibold tracking-widest uppercase flex items-center gap-2">
                <div class="w-2 h-2 bg-slate-400 rounded-full animate-pulse"></div>
                IDLE
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Left Panel -->
            <div class="lg:col-span-5 space-y-6">
                <!-- Single Entry -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="font-semibold text-lg text-slate-900 mb-4">Add Single Observation</h2>
                    <form id="dataForm" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">METRIC A</label>
                                <input type="number" id="inputA" min="0" max="1" step="0.01" value="0.4" class="block w-full rounded-xl border border-slate-200 px-4 py-3 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">METRIC B</label>
                                <input type="number" id="inputB" min="0" max="1" step="0.01" value="0.6" class="block w-full rounded-xl border border-slate-200 px-4 py-3 text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">OBSERVED PROBABILITY</label>
                            <input type="number" id="outputProb" min="0" max="1" step="0.01" value="0.45" class="block w-full rounded-xl border border-slate-200 px-4 py-3 text-sm">
                        </div>
                        <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white font-medium py-3.5 rounded-2xl text-sm">ADD TO DATASET</button>
                    </form>
                </div>

                <!-- Bulk Paste -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="font-semibold text-lg text-slate-900 mb-3">Bulk Paste Dataset</h2>
                    <textarea id="bulkPaste" rows="6" class="block w-full rounded-2xl border border-slate-200 p-4 text-sm font-mono" placeholder="0.1,0.9,0.05&#10;0.8,0.2,0.88&#10;0.5,0.5,0.48"></textarea>
                    <div class="flex gap-3 mt-3">
                        <button id="loadBulkBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl text-sm">REPLACE</button>
                        <button id="appendBulkBtn" class="flex-1 bg-slate-700 hover:bg-slate-800 text-white py-3 rounded-2xl text-sm">APPEND</button>
                    </div>
                </div>

                <!-- Dataset -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-semibold">Training Dataset <span id="datasetSize" class="text-blue-600">(5)</span></h3>
                        <button id="clearDatasetBtn" class="text-rose-600 text-xs hover:underline">CLEAR ALL</button>
                    </div>
                    <div class="border border-slate-100 rounded-2xl max-h-64 overflow-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-slate-50 sticky top-0">
                                <tr>
                                    <th class="px-5 py-3 text-left text-xs text-slate-500">A</th>
                                    <th class="px-5 py-3 text-left text-xs text-slate-500">B</th>
                                    <th class="px-5 py-3 text-left text-xs text-slate-500">PROB</th>
                                </tr>
                            </thead>
                            <tbody id="datasetTableBody" class="divide-y font-mono text-xs"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="lg:col-span-7 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="font-semibold text-lg mb-4">Training Configuration</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">EPOCHS</label>
                            <input type="number" id="iterationsInput" value="2500" class="block w-full rounded-xl border border-slate-200 px-4 py-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">ERROR THRESHOLD</label>
                            <input type="number" id="errorThreshInput" value="0.008" step="0.001" class="block w-full rounded-xl border border-slate-200 px-4 py-3 text-sm">
                        </div>
                    </div>

                    <div class="mt-6 space-y-3">
                        <div class="flex justify-between text-xs">
                            <span id="progressCount">Epochs: 0 / 2500</span>
                            <span id="progressPercent" class="font-semibold text-blue-600">0%</span>
                        </div>
                        <div class="h-3 bg-slate-100 rounded-3xl overflow-hidden">
                            <div id="progressBar" class="h-full bg-blue-600 w-0 transition-all duration-100"></div>
                        </div>
                        <div class="flex justify-between text-xs font-mono text-slate-500">
                            <span id="currentLoss">Loss: —</span>
                            <span id="firebaseStatus">Ready</span>
                        </div>
                    </div>

                    <button id="trainBtn" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 py-4 text-white font-semibold rounded-2xl text-sm">
                        TRAIN MODEL (Using Inline Web Worker)
                    </button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="font-semibold text-lg mb-4">Inference</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">METRIC A</label>
                            <input type="number" id="testA" value="0.5" step="0.05" class="block w-full rounded-xl border border-slate-200 px-4 py-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">METRIC B</label>
                            <input type="number" id="testB" value="0.5" step="0.05" class="block w-full rounded-xl border border-slate-200 px-4 py-3 text-sm">
                        </div>
                    </div>
                    <button id="predictBtn" disabled class="mt-6 w-full bg-slate-900 hover:bg-black py-4 text-white font-semibold rounded-2xl text-sm">PREDICT PROBABILITY</button>
                    <div class="mt-8 p-6 bg-slate-50 rounded-2xl text-center">
                        <div class="text-slate-600 text-sm">Predicted Probability</div>
                        <div id="predictionResult" class="text-6xl font-bold text-slate-900 mt-2">—</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh7Ute6LeSAxcNDEQwZg5m0cA4ujnLCfg",
            authDomain: "test-17881.firebaseapp.com",
            databaseURL: "https://test-17881-default-rtdb.firebaseio.com",
            projectId: "test-17881",
            storageBucket: "test-17881.firebasestorage.app",
            messagingSenderId: "1057428047643",
            appId: "1:1057428047643:web:f3801c0d933225a5cd35be"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let dataSet = [
            { input: [0.1, 0.9], output: [0.05] },
            { input: [0.8, 0.2], output: [0.88] },
            { input: [0.5, 0.5], output: [0.48] },
            { input: [0.2, 0.4], output: [0.22] },
            { input: [0.7, 0.6], output: [0.65] }
        ];

        let activeNetworkModel = null;

        // DOM Elements
        const trainBtn = document.getElementById('trainBtn');
        const predictBtn = document.getElementById('predictBtn');
        const statusBadge = document.getElementById('statusBadge');
        const progressBar = document.getElementById('progressBar');
        const progressCount = document.getElementById('progressCount');
        const progressPercent = document.getElementById('progressPercent');
        const currentLoss = document.getElementById('currentLoss');
        const firebaseStatus = document.getElementById('firebaseStatus');

        function renderDatasetTable() {
            const tbody = document.getElementById('datasetTableBody');
            tbody.innerHTML = '';
            document.getElementById('datasetSize').textContent = `(${dataSet.length})`;
            
            dataSet.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-5 py-3">${item.input[0].toFixed(2)}</td>
                    <td class="px-5 py-3">${item.input[1].toFixed(2)}</td>
                    <td class="px-5 py-3 font-semibold text-emerald-600">${(item.output[0]*100).toFixed(1)}%</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Bulk Paste Handlers
        document.getElementById('loadBulkBtn').addEventListener('click', () => {
            const text = document.getElementById('bulkPaste').value.trim();
            const lines = text.split('\n');
            const newData = [];
            lines.forEach(line => {
                const parts = line.split(',').map(x => parseFloat(x.trim()));
                if (parts.length === 3 && !isNaN(parts[0]) && !isNaN(parts[1]) && !isNaN(parts[2])) {
                    newData.push({ input: [parts[0], parts[1]], output: [Math.max(0, Math.min(1, parts[2]))] });
                }
            });
            if (newData.length > 0) dataSet = newData;
            renderDatasetTable();
        });

        document.getElementById('appendBulkBtn').addEventListener('click', () => {
            const text = document.getElementById('bulkPaste').value.trim();
            const lines = text.split('\n');
            const newData = [];
            lines.forEach(line => {
                const parts = line.split(',').map(x => parseFloat(x.trim()));
                if (parts.length === 3 && !isNaN(parts[0]) && !isNaN(parts[1]) && !isNaN(parts[2])) {
                    newData.push({ input: [parts[0], parts[1]], output: [Math.max(0, Math.min(1, parts[2]))] });
                }
            });
            dataSet.push(...newData);
            renderDatasetTable();
        });

        document.getElementById('dataForm').addEventListener('submit', e => {
            e.preventDefault();
            const a = parseFloat(document.getElementById('inputA').value);
            const b = parseFloat(document.getElementById('inputB').value);
            const p = parseFloat(document.getElementById('outputProb').value);
            if (!isNaN(a) && !isNaN(b) && !isNaN(p)) {
                dataSet.push({ input: [a, b], output: [Math.max(0, Math.min(1, p))] });
                renderDatasetTable();
                e.target.reset();
            }
        });

        document.getElementById('clearDatasetBtn').addEventListener('click', () => {
            if (confirm("Clear all data?")) {
                dataSet = [];
                renderDatasetTable();
            }
        });

        // ==================== WEB WORKER (Inline) ====================
        trainBtn.addEventListener('click', () => {
            if (dataSet.length < 3) {
                alert("Please add at least 3 data points");
                return;
            }

            const iterations = parseInt(document.getElementById('iterationsInput').value) || 2500;
            const errorThresh = parseFloat(document.getElementById('errorThreshInput').value) || 0.008;

            trainBtn.disabled = true;
            statusBadge.innerHTML = `<div class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></div>TRAINING`;
            statusBadge.className = "bg-amber-100 text-amber-700 px-4 py-1.5 rounded-2xl text-xs font-semibold tracking-widest uppercase flex items-center gap-2";

            // Worker code as string (embedded inside this HTML file)
            const workerScript = `
                importScripts('https://cdn.jsdelivr.net/npm/brain.js@2.0.0-beta.24/browser.min.js');
                
                self.onmessage = function(e) {
                    const { dataSet, iterations, errorThresh } = e.data;
                    
                    const net = new brain.NeuralNetwork({
                        hiddenLayers: [5, 3],
                        activation: 'sigmoid'
                    });
                    
                    net.train(dataSet, {
                        iterations: iterations,
                        errorThresh: errorThresh,
                        logPeriod: 40,
                        callback: (stats) => {
                            self.postMessage({
                                type: 'progress',
                                iterations: stats.iterations,
                                error: stats.error
                            });
                        }
                    });
                    
                    self.postMessage({
                        type: 'complete',
                        model: net.toJSON()
                    });
                };
            `;

            const blob = new Blob([workerScript], { type: 'application/javascript' });
            const workerURL = URL.createObjectURL(blob);
            const worker = new Worker(workerURL);

            worker.onmessage = (event) => {
                const data = event.data;

                if (data.type === 'progress') {
                    const percent = Math.min(100, Math.round((data.iterations / iterations) * 100));
                    progressBar.style.width = percent + '%';
                    progressPercent.textContent = percent + '%';
                    progressCount.textContent = `Epochs: ${data.iterations} / ${iterations}`;
                    currentLoss.textContent = `Loss: ${data.error.toFixed(6)}`;
                } 
                else if (data.type === 'complete') {
                    activeNetworkModel = new brain.NeuralNetwork();
                    activeNetworkModel.fromJSON(data.model);
                    
                    predictBtn.disabled = false;
                    trainBtn.disabled = false;

                    statusBadge.innerHTML = `<div class="w-2 h-2 bg-emerald-500 rounded-full"></div>READY`;
                    statusBadge.className = "bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-2xl text-xs font-semibold tracking-widest uppercase flex items-center gap-2";

                    // Save to Firebase
                    set(ref(db, 'models/probability_model_v6'), {
                        model: data.model,
                        metadata: {
                            trainedOn: new Date().toISOString(),
                            sampleCount: dataSet.length
                        }
                    }).then(() => {
                        firebaseStatus.textContent = "✅ Saved to Firebase";
                    });
                }
            };

            worker.postMessage({ dataSet, iterations, errorThresh });
        });

        // Prediction
        predictBtn.addEventListener('click', () => {
            if (!activeNetworkModel) return;
            const a = parseFloat(document.getElementById('testA').value);
            const b = parseFloat(document.getElementById('testB').value);
            const result = activeNetworkModel.run([a, b]);
            document.getElementById('predictionResult').textContent = (result[0] * 100).toFixed(1) + '%';
        });

        // Initialize
        renderDatasetTable();
    </script>
</body>
</html>
